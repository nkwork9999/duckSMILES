extension:
  name: ducksmiles
  description: Cheminformatics toolkit for DuckDB - SMILES, SMARTS substructure match JSON, MolHash, standardization, MCS, scaffold networks, canonical SMILES normalization, Murcko scaffolds, InChI, MOL/SDF, PDB, SELFIES, LogP, TPSA, Morgan/ECFP and MACCS fingerprints, and Tanimoto similarity from SQL
  version: 0.5.0
  language: C++
  build: cmake
  license: MIT
  maintainers:
    - nkwork9999

repo:
  github: nkwork9999/duckSMILES
  ref: main

docs:
  hello_world: |
    -- Parse SMILES and get molecular formula
    SELECT mol_formula('CCO');
    -- C2H6O

    -- Calculate molecular weight
    SELECT round(mol_weight('c1ccccc1'), 2);
    -- 78.11

    -- Normalize a common Kekule aromatic form
    SELECT canonical_smiles('C1=CC=CC=C1');
    -- c1ccccc1

    -- Bemis-Murcko scaffold extraction
    SELECT murcko_scaffold('CC(=O)Oc1ccccc1C(=O)O');
    -- c1ccccc1

    -- SMARTS substructure atom mappings as JSON
    SELECT mol_substructure_matches_json('CC(=O)O', 'C=O');

    -- MolHash-style SQL grouping keys
    SELECT mol_hash('CC(=O)[O-].[Na+]', 'element_graph');
    -- C(C)(O)O.[Na]

    -- Salt handling and parent normalization
    SELECT fragment_parent('CC(=O)[O-].[Na+]');
    -- C(C)(=O)O

    -- Maximum common substructure
    SELECT mcs_smarts('CC(=O)O', 'CC(=O)N');
    -- C(C)=O

    -- Wildman-Crippen LogP (matches RDKit)
    SELECT round(logp_crippen('CCO'), 4);
    -- -0.0014

    -- Topological polar surface area (RDKit default N/O scope)
    SELECT round(tpsa('CC(=O)Oc1ccccc1C(=O)O'), 2);
    -- 63.60

    -- Morgan/ECFP fingerprint as 2048-bit BLOB (ECFP4 default)
    SELECT bit_count(CAST(morgan_fp_bits('CC(=O)Oc1ccccc1C(=O)O') AS BIT));
    -- 26   (aspirin popcount)

    -- Tanimoto similarity between two fingerprint BLOBs (no CAST AS BIT needed)
    SELECT round(tanimoto_bit(morgan_fp_bits('CCO'), morgan_fp_bits('CCN')), 4);
    -- 0.3333

    -- MACCS keys fingerprint as a 21-byte (167-bit) BLOB (matches RDKit)
    SELECT octet_length(maccs_keys('CCO'));
    -- 21

    -- Validate and extract InChI layers
    SELECT inchi_formula('InChI=1S/C2H4O2/c1-2(3)4/h1H3,(H,3,4)');
    -- C2H4O2

    -- Convert SMILES to SELFIES (ML-friendly notation)
    SELECT smiles_to_selfies('CCO');

  extended_description: |
    Cheminformatics toolkit for DuckDB - analyze molecular structures directly from SQL
    without leaving your database. Pure Rust implementation with no external chemistry
    library dependencies (no RDKit required).

    **Supported Formats:**
    - SMILES/SMARTS: Molecular validation, substructure search with match JSON, MolHash, standardization, MCS, scaffold networks, canonical SMILES normalization, Bemis-Murcko scaffolds, formula, weight, atom/bond counts, LogP, TPSA
    - InChI/InChIKey: Layer extraction, stereochemistry detection, skeleton matching
    - MOL/SDF: V2000/V3000 CTAB parsing, molecule counting, complete atom/bond/property JSON extraction
    - PDB/CIF/XYZ: Protein structure analysis (atom, chain, residue, model counts)
    - SELFIES: Bidirectional SMILES-SELFIES conversion for ML pipelines

    **SQL scalar functions** for molecular property extraction, format conversion,
    structural comparison, and physicochemical property prediction. Ideal for
    cheminformatics datasets, drug discovery pipelines, and molecular ML feature
    engineering.

    **LogP:** `logp_crippen()` implements the Wildman-Crippen atom-contribution
    method (110 SMARTS patterns, 68 atom types) and matches RDKit's
    `Crippen.MolLogP` exactly for small molecules.

    **TPSA:** `tpsa()` implements RDKit's default topological polar surface area
    atom-contribution method for nitrogen and oxygen atoms, returning a scalar
    descriptor suitable for drug-likeness filters and molecular ML features.

    **Canonical SMILES:** `canonical_smiles()` returns a deterministic normalized
    SMILES string for the supported graph subset and includes conservative
    six-membered Kekule aromaticity perception, normalizing common forms like
    `C1=CC=CC=C1` to `c1ccccc1`. It is intentionally smaller than RDKit's full
    canonicalization, sanitization, valence, and stereo stack.

    **Bemis-Murcko scaffolds:** `murcko_scaffold()` removes terminal side chains
    while retaining ring systems and linkers between ring systems.
    `generic_scaffold()` converts the resulting framework to carbon/single-bond
    form for scaffold-class grouping, and `ring_systems_json()` exposes the
    perceived ring systems and individual rings as ordered JSON.

    **SMARTS substructure search:** `mol_has_substructure()` and
    `mol_substructure_count()` expose boolean and uniquified count queries.
    `mol_substructure_matches_json()` returns each unique match's atom mapping
    as ordered JSON with 1-based target atom indices in SMARTS pattern atom order.
    The matcher supports ring closures, recursive SMARTS, `R/R0`, `r`, `x`,
    `D`, `v`, isotope, atom-map, and bracket-chirality predicates.

    **MolHash and standardization:** `mol_hash()` exposes SQL grouping keys such
    as `formula`, `net_charge`, `degree_vector`, `element_graph`,
    `bond_order_graph`, `anonymous_graph`, `murcko_scaffold`, and
    `generic_scaffold`; `mol_hash_methods()` lists supported methods.
    `largest_fragment()`, `strip_salts()`, `neutralize_charges()`,
    `normalize_smiles()`, and `fragment_parent()` provide SQL-native cleanup for
    supplier salts and registry-like compound tables.

    **MCS and scaffold network:** `mcs_smarts()` computes a connected maximum
    common subgraph for two molecules, `mcs_json()` includes 1-based atom
    mappings, and `scaffold_network_json()` emits molecule, Murcko, generic
    scaffold, and ring-system nodes plus edges.

    **MOL/SDF structure JSON:** `mol_block_atoms_json()`,
    `mol_block_bonds_json()`, and `mol_block_json()` expose the parsed atom
    table, bond table, and complete MOL/SDF record from SQL. SDF property
    functions (`mol_block_property()`, `mol_block_properties_json()`,
    `sdf_property()`, and `sdf_properties_json()`) parse complete data item
    blocks from `> <FIELD>` headers. Multi-line values, empty values, duplicate
    field names, and original field order are preserved; JSON output uses ordered
    arrays rather than lossy objects.

    **MOL V3000:** MOL/SDF extraction functions parse V3000 `COUNTS`, `ATOM`,
    and `BOND` CTAB blocks, including line continuation records, so formula,
    weight, atom/bond counts, full atom/bond JSON, 3D coordinate summaries, and
    SDF properties work across both V2000 and V3000 inputs.

    **Morgan / ECFP fingerprint:** `morgan_fp_bits()` ports RDKit's MorganGenerator
    (layered BFS + hash_combine + dead-atom dedup) to Rust and returns a fixed-width
    bit vector as `BLOB`. Defaults to ECFP4 (radius=2, 2048 bit); 3-arg overload
    `morgan_fp_bits(smi, radius, n_bits)` exposes full control.

    **MACCS keys:** `maccs_keys()` ports RDKit's `MACCS.cpp` — the 166 public
    structural keys as a fixed 21-byte (167-bit) `BLOB`, with bit `n` matching
    RDKit's key number. Each bit is a SMARTS substructure question (presence,
    count threshold, or a special rule like the per-atom element scan, the
    "≥2 aromatic rings" key, and the multi-fragment key). Drops straight into
    `tanimoto_bit()` alongside Morgan, so SQL alone can contrast the two
    fingerprints' design philosophies. Bit-for-bit verified against RDKit's
    `MACCSkeys.GenMACCSKeys` for lowercase aromatic SMILES; common six-membered
    Kekule aromatic forms are normalized by the conservative aromaticity pass.

    **Tanimoto similarity:** `tanimoto_bit(BLOB, BLOB) -> DOUBLE` computes
    `popcount(a & b) / popcount(a | b)` directly on raw BLOB bytes (no
    `CAST AS BIT` round-trip), processing 8 bytes at a time via `count_ones()`
    so it lowers to POPCNT on x86_64 / CNT on aarch64. Mismatched lengths raise
    a clear `InvalidInputException`; empty-vs-empty returns `0.0` (RDKit
    convention). The SQL-level `bit_count(a & b)::DOUBLE / bit_count(a | b)`
    is still available and produces bit-exact identical results.

    **Architecture:** Rust (core logic, 5 crates) + C++ (DuckDB integration via FFI)
